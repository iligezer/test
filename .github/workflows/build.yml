name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Theos
        run: |
          git clone https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
      
      - name: Download SDK
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.0.sdk.tar.xz -o $HOME/sdk.tar.xz
          tar -xf $HOME/sdk.tar.xz -C $HOME/theos/sdks/
      
      - name: Build
        run: make package FINALPACKAGE=1
      
      - name: Upload .deb
        uses: actions/upload-artifact@v3
        with:
          name: aimbot-deb
          path: packages/*.deb
