name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # тоже обновим до v4

      - name: Install system dependencies
        run: |
          brew install ldid xz

      - name: Clone Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "PATH=$HOME/theos/bin:$PATH" >> $GITHUB_ENV

      - name: Download iOS SDK
        run: |
          mkdir -p $HOME/theos/sdks
          curl -L https://github.com/theos/sdks/releases/latest/download/iPhoneOS14.5.sdk.tar.xz -o $HOME/sdk.tar.xz
          tar -xf $HOME/sdk.tar.xz -C $HOME/theos/sdks/
          ls -la $HOME/theos/sdks/

      - name: Build package
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4  # ← ГЛАВНОЕ ИЗМЕНЕНИЕ: v4
        with:
          name: aimbot-deb
          path: packages/*.deb
