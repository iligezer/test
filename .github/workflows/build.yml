name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Theos and SDKs
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: 'theos'
          theos-src: 'https://github.com/theos/theos'
          theos-sdks: 'https://github.com/theos/sdks'
          orion: 'false'

      - name: Build Package
        run: |
          export THEOS=./theos
          make clean package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v3
        with:
          name: aimbot-deb
          path: packages/*.deb

      - name: Upload .dylib
        uses: actions/upload-artifact@v3
        with:
          name: aimbot-dylib
          path: .theos/obj/debug/*.dylib
